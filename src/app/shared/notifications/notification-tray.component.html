<ng-container *ngIf="totalCount > 0">
  <button
    type="button"
    class="app-notification-tray__btn"
    [class.has-active]="activeCount > 0"
    [attr.aria-expanded]="open"
    aria-haspopup="dialog"
    aria-label="Open notifications"
    (click)="toggle()"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
      <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2M8 1.918l-.797.161A4 4 0 0 0 4 6c0 .628-.134 2.197-.459 3.742-.16.767-.376 1.566-.663 2.258h10.244c-.287-.692-.502-1.49-.663-2.258C12.134 8.197 12 6.628 12 6a4 4 0 0 0-3.203-3.92zM14.22 12c.223.447.481.801.78 1H1c.299-.199.557-.553.78-1C2.68 10.2 3 6.88 3 6c0-2.42 1.72-4.44 4.005-4.901a1 1 0 1 1 1.99 0A5 5 0 0 1 13 6c0 .88.32 4.2 1.22 6"/>
    </svg>
    <span class="app-notification-tray__badge" *ngIf="totalCount > 0">
      {{ totalCount }}
    </span>
  </button>

  <div
    class="app-notification-tray__panel"
    role="dialog"
    aria-label="Notifications"
    *ngIf="open"
  >
    <div class="app-notification-tray__panel-header">
      <span class="app-notification-tray__panel-title">Notifications</span>
      <button
        type="button"
        class="btn-close"
        aria-label="Close notifications panel"
        (click)="close()"
      ></button>
    </div>

    <div class="app-notification-tray__panel-body">
      <div
        *ngFor="let n of items; trackBy: trackById"
        class="alert app-notification-tray__item d-flex align-items-start"
        [ngClass]="alertClass(n)"
        [class.is-dismissed]="isItemDismissed(n)"
        role="alert"
      >
        <span class="app-notification-tray__item-icon" aria-hidden="true" [ngSwitch]="iconKey(n)">
          <svg *ngSwitchCase="'success'" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>
          <svg *ngSwitchCase="'warning'" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5m.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/></svg>
          <svg *ngSwitchCase="'error'" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M11.46.146A.5.5 0 0 0 11.107 0H4.893a.5.5 0 0 0-.353.146L.146 4.54A.5.5 0 0 0 0 4.893v6.214a.5.5 0 0 0 .146.353l4.394 4.394a.5.5 0 0 0 .353.146h6.214a.5.5 0 0 0 .353-.146l4.394-4.394a.5.5 0 0 0 .146-.353V4.893a.5.5 0 0 0-.146-.353zm-6.106 4.5L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 1 1 .708-.708"/></svg>
          <svg *ngSwitchDefault xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16m.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2"/></svg>
        </span>
        <div class="app-notification-tray__item-body">
          <div *ngIf="n.title" class="app-notification-tray__item-title" [innerHTML]="n.title"></div>
          <div class="app-notification-tray__item-message" [innerHTML]="n.message"></div>
        </div>
      </div>
    </div>
  </div>
</ng-container>
