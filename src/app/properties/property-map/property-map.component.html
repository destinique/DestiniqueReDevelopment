<div class="property-map-wrapper">
  <div class="property-map-skeleton" *ngIf="!mapReady"></div>
  <div #mapContainer class="property-map-canvas" [class.is-hidden]="!mapReady"></div>

  <!-- Centered loader when list is updating from map bounds -->
  <div *ngIf="mapReady && mapPropertiesLoading" class="property-map-loading-overlay" aria-hidden="true">
    <div class="property-map-loading-spinner"></div>
  </div>

  <!-- Live counter: visible properties / total properties -->
  <div *ngIf="mapReady && properties?.length" class="property-map-count-pill">
    {{ visiblePropertiesCount }} / {{ totalProperties || properties.length }} properties
  </div>

  <!-- Search-as-I-move toggle -->
  <label *ngIf="mapReady" class="property-map-search-toggle" [class.is-active]="searchAsIMove">
    <span class="property-map-search-toggle__track">
      <input
        type="checkbox"
        class="property-map-search-toggle__input"
        [(ngModel)]="searchAsIMove"
        aria-label="Search as I move the map" />
      <span class="property-map-search-toggle__thumb"></span>
    </span>
    <span class="property-map-search-toggle__label">Search as I move the map</span>
  </label>

  <!-- Reset map view to show all properties -->
  <button
    *ngIf="mapReady && properties?.length"
    type="button"
    class="property-map-reset-btn"
    (click)="resetMapView()">
    Reset map &amp; list
  </button>
</div>
