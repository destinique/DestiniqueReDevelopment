<!-- list-id-search.component.html -->
<div class="search-input-wrapper">
  <form (submit)="onSearch(); $event.preventDefault()">
    <input type="text"
           class="search-input"
           [(ngModel)]="searchTerm"
           name="searchTerm"
           [placeholder]="(userRole == 1 || userRole == 2) ? 'List Id or Headline' : 'Search By List Id'"
           (keypress)="onKeyPress($event)"
           [disabled]="isLoading"/>
    <button *ngIf="searchTerm && !isLoading"
            type="button"
            class="search-clear-btn"
            (click)="clearSearch()"
            aria-label="Clear search">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
        <path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8 2.146 2.854Z"/>
      </svg>
    </button>
    <button type="button"
            class="search-icon-btn"
            (click)="onSearch()"
            [disabled]="isLoading"
            aria-label="Search">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 640 640">
        <path d="M480 272C480 317.9 465.1 360.3 440 394.7L566.6 521.4C579.1 533.9 579.1 554.2 566.6 566.7C554.1 579.2 533.8 579.2 521.3 566.7L394.7 440C360.3 465.1 317.9 480 272 480C157.1 480 64 386.9 64 272C64 157.1 157.1 64 272 64C386.9 64 480 157.1 480 272zM272 416C351.5 416 416 351.5 416 272C416 192.5 351.5 128 272 128C192.5 128 128 192.5 128 272C128 351.5 192.5 416 272 416z"/>
      </svg>
    </button>
  </form>
</div>
