<!-- sort-dropdown.component.html -->
<div class="inline-dropdown sort-dropdown">
  <span class="inline-dropdown-label">Sort by:</span>
  <div class="inline-dropdown-select-wrap">
    <select class="inline-dropdown-select" [value]="selectedSort" (change)="onSortChange($event)">
      <option *ngFor="let option of sortOptions" [value]="option.value">
        {{ option.label }}
      </option>
    </select>
    <span class="inline-dropdown-arrow" aria-hidden="true">▼</span>
  </div>
</div>
